<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>知识库日志</title>
<style>
  body { margin: 0; background: #eef1f5; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif; }
  .page { max-width: 760px; margin: 0 auto; background: #ffffff; color: #1f2328; padding: 28px 22px 56px; line-height: 1.7; }
  .title { font-size: 26px; font-weight: 700; margin: 0 0 6px; }
  .subtitle { color: #656d76; margin: 0 0 24px; }
  .entry { border-left: 3px solid #1a7f37; padding: 4px 0 4px 14px; margin: 0 0 14px; }
  .entry .when { color: #1a7f37; font-weight: 600; font-size: 13px; }
  .entry .kind { color: #8250df; font-weight: 600; font-size: 13px; }
  .entry p { margin: 4px 0 0; }
  .empty { color: #7a5d00; background: #fff8e6; border-left: 4px solid #d4a72c; border-radius: 6px; padding: 10px 14px; }
</style>
</head>
<body>
<div class="page">
  <div class="title">🕑 知识库日志</div>
  <div class="subtitle">只追加 · 最新的放最上面 · 每条以「[日期] 类型 · 标题」开头</div>

  <div class="empty">还没有记录。第一次录入资料后，我会在这里追加一条，例如：[2026-06-20] ingest · 某篇文章。</div>
</div>
</body>
</html>
