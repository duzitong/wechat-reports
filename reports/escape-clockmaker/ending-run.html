<h1>你冲进了光里</h1>
<p>光晕包住全身，脚步却越来越沉。等视线恢复，你正站在一间<span class="em">没有窗、只有一扇锁着的门</span>的房间里。中央那座挂钟，重新开始滴答。</p>
<p>桌上压着一张便签，字迹潦草，好像……你曾经读过。</p>
<p>也许出口从来不是那道门。也许你需要的，不是逃。</p>
