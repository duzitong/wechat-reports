<h1>当指针指向 12</h1>
<p>你伸手，把冰冷的指针一格一格拨向顶端。<span class="em">Ⅻ</span>。就在咬合的那一刻，滴答声戛然而止——整座房间像退潮一样，褪成一片白光。</p>
<p>很远的地方，有人在轻轻唤你，用的是你<span class="em">真正的名字</span>。你睁开眼。这一次，是真的醒了。</p>
<p class="sm">你让停摆的钟走完了它的一圈。恭喜——你找到了真正的出口。</p>
