<h1>阴影里，站着另一个你</h1>
<p>长廊的阴影缓缓让开。那里站着一个人——你的脸，你的姿势，正对着你微笑。他伸出手，掌心是一把<span class="em">一模一样的黄铜钥匙</span>。</p>
<p>“轮到你了，”他轻声说，“该<span class="em">换班</span>了。”</p>
<p>下一个在房间里醒来的人，会看见你站在钟旁，微笑着，递出那把钥匙。</p>
