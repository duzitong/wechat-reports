<h1>黄铜钥匙，和半张烧焦的照片</h1>
<p>正确的一组落定，抽屉“啪”地弹开。里面躺着一把<span class="em">黄铜钥匙</span>，还有半张烧焦的照片——照片上正是这个房间，而站在钟旁的那个人，<span class="em">和你有一模一样的脸</span>。</p>
<p>你顾不上多想，钥匙插进门锁，门开了。门外是一条长廊，尽头透着微光。可你僵在原地：长廊的墙上，挂着<span class="em">另一座一模一样的钟</span>，同样停在 9 点 04 分。</p>
